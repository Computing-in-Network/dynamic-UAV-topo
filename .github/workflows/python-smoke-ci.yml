name: Python Smoke CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Python compile check
        run: |
          python3 -m py_compile scripts/*.py
          python3 -m py_compile tests/*.py

      - name: Run Python unit tests
        run: |
          for f in tests/test_*.py; do
            python3 "$f"
          done

      - name: Run Ricci CUDA PoC (no CUDA)
        run: |
          python3 scripts/ricci_cuda_poc.py --disable-cuda --nodes 12 --density 0.2 --seed 2026 --repeat 2
