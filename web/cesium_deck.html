<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Cesium + Deck.gl</title>
    <link rel="stylesheet" href="https://unpkg.com/cesium/Build/Cesium/Widgets/widgets.css" />
    <style>
      :root {
        --bg: #050816;
        --panel: #0e1a30;
        --line: #2c4a8c;
        --text: #e6eefc;
        --muted: #8aa4d9;
        --ok: #22c55e;
        --warn: #ef4444;
        --landed: #60a5fa;
      }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 5% 5%, #1b3064, var(--bg));
      }
      .layout {
        height: 100%;
        display: grid;
        grid-template-columns: 2.3fr 1fr;
        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
      }
      .map-card, .side-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: color-mix(in srgb, var(--panel) 90%, #ffffff 10%);
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .side-inner {
        display: grid;
        grid-template-rows: auto auto auto 200px 1fr;
        height: 100%;
      }
      .meta {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
      }
      #deck {
        border-bottom: 1px solid var(--line);
        position: relative;
      }
      .table-wrap {
        overflow: auto;
      }
      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 12px;
      }
      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .controls button, .controls select {
        background: #0f2040;
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 8px;
        padding: 4px 8px;
      }
      .controls button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .timeline-status {
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
      }
      .slider-wrap {
        display: flex;
        gap: 8px;
        align-items: center;
        flex: 1;
        min-width: 180px;
      }
      .slider-wrap input[type='range'] {
        width: 100%;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th, td {
        padding: 8px;
        border-bottom: 1px dashed #284888;
        text-align: left;
      }
      .status-0 { color: var(--ok); }
      .status-1 { color: var(--warn); }
      .status-2 { color: var(--landed); }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 11px;
      }
      @media (max-width: 1024px) {
        .layout { grid-template-columns: 1fr; }
        .side-inner { grid-template-rows: auto auto auto 140px 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="map-card"><div id="map"></div></div>
      <div class="side-card">
        <div class="side-inner">
          <div class="meta" id="meta">初始化中...</div>
          <div class="controls">
            <label><input id="show_links" type="checkbox" checked />链路</label>
            <label><input id="show_fire" type="checkbox" checked />火点/火区</label>
            <label><input id="show_mission" type="checkbox" checked />任务</label>
            <label>模式
              <select id="timeline_mode">
                <option value="realtime">实时</option>
                <option value="replay">回放</option>
              </select>
            </label>
            <button id="timeline_play" type="button">播放</button>
            <button id="timeline_pause" type="button">暂停</button>
            <button id="timeline_reset" type="button">重置</button>
            <label>速率
              <select id="timeline_speed">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
              </select>
            </label>
            <div class="slider-wrap">
              <span>时间轴:</span>
              <input id="history_slider" type="range" min="0" max="0" value="0" disabled />
              <span id="history_label">-</span>
            </div>
            <span id="timeline_status" class="timeline-status">实时模式</span>
          </div>
          <div id="deck"></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Lat</th><th>Lon</th><th>Alt</th><th>Status</th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>UAV</th><th>优先级</th><th>任务解释</th></tr></thead>
              <tbody id="mission_rows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/cesium/Build/Cesium/Cesium.js"></script>
    <script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"></script>
    <script>
      const state = { timestamp: 0, uavs: [], links: [], fire_hotspots: [], fire_regions: [], mission_targets: [] };
      const rows = document.getElementById('rows');
      const missionRows = document.getElementById('mission_rows');
      const meta = document.getElementById('meta');
      const showLinks = document.getElementById('show_links');
      const showFire = document.getElementById('show_fire');
      const showMission = document.getElementById('show_mission');
      const timelineMode = document.getElementById('timeline_mode');
      const timelinePlay = document.getElementById('timeline_play');
      const timelinePause = document.getElementById('timeline_pause');
      const timelineReset = document.getElementById('timeline_reset');
      const timelineSpeed = document.getElementById('timeline_speed');
      const historySlider = document.getElementById('history_slider');
      const historyLabel = document.getElementById('history_label');
      const timelineStatus = document.getElementById('timeline_status');
      let basemapMode = 'OSM';
      let osmErrorCount = 0;
      const forceBasemap = new URLSearchParams(window.location.search).get('basemap');
      const fireRegionMode = new URLSearchParams(window.location.search).get('fire_region') !== 'off';
      const stateHistory = [];
      const maxHistory = 120;
      let replayIndex = -1;
      let replayMode = 'realtime';
      let replayPlaying = false;
      let replaySpeed = 1.0;
      let replayAccumulatorMs = 0;
      let lastReplayTickMs = performance.now();
      const fetchIntervalMs = 500;

      Cesium.Ion.defaultAccessToken = undefined;
      const osmProvider = new Cesium.OpenStreetMapImageryProvider({
        url: 'https://tile.openstreetmap.org/'
      });
      const fallbackProvider = new Cesium.GridImageryProvider({
        cells: 16,
        color: Cesium.Color.fromCssColorString('#35548f'),
        glowColor: Cesium.Color.fromCssColorString('#203a71'),
        glowWidth: 6,
        backgroundColor: Cesium.Color.fromCssColorString('#071127')
      });
      const viewer = new Cesium.Viewer('map', {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: true,
        sceneModePicker: false,
        navigationHelpButton: false,
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        imageryProvider: osmProvider
      });
      viewer.scene.globe.depthTestAgainstTerrain = false;

      function switchToFallbackBasemap() {
        if (basemapMode === 'GRID') return;
        basemapMode = 'GRID';
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(fallbackProvider);
      }
      function switchToOsmBasemap() {
        basemapMode = 'OSM';
        osmErrorCount = 0;
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(osmProvider);
      }

      if (forceBasemap === 'grid') {
        switchToFallbackBasemap();
      } else {
        switchToOsmBasemap();
      }

      // Avoid false fallback on transient tile errors: only switch after repeated failures.
      osmProvider.errorEvent.addEventListener(() => {
        if (forceBasemap === 'osm') {
          return;
        }
        osmErrorCount += 1;
        if (osmErrorCount >= 25) {
          switchToFallbackBasemap();
        }
      });

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(116.4074, 39.9042, 22000.0)
      });

      function addHistoryFrame(frame) {
        stateHistory.push(frame);
        if (stateHistory.length > maxHistory) {
          stateHistory.shift();
        }
        if (replayMode === 'realtime') {
          replayIndex = stateHistory.length - 1;
        } else if (replayIndex >= stateHistory.length) {
          replayIndex = stateHistory.length - 1;
        }
        historySlider.max = String(Math.max(0, stateHistory.length - 1));
        historySlider.disabled = stateHistory.length <= 1;
        if (replayMode === 'realtime') {
          historySlider.value = String(Math.max(0, replayIndex));
        }
        updateTimelineStatus();
      }

      function pickFrameForRender() {
        if (stateHistory.length === 0) {
          return null;
        }
        if (replayMode === 'realtime') {
          replayIndex = stateHistory.length - 1;
          historySlider.value = String(Math.max(0, replayIndex));
          return stateHistory[Math.max(0, replayIndex)];
        }
        const idx = Math.max(0, Math.min(replayIndex, stateHistory.length - 1));
        return stateHistory[idx];
      }

      function applyLayerVisibility(frame) {
        const links = showLinks.checked ? frame.links : [];
        const mission = showMission.checked ? frame.mission_targets : [];
        upsertCesiumEntities(frame.uavs);
        upsertCesiumLinks(frame.uavs, links);
        upsertFireRegions(showFire.checked ? frame.fire_regions : []);
        upsertFireHotspots(showFire.checked ? frame.fire_hotspots : []);
        upsertMissionLines(frame.uavs, mission);
        updateDeck(frame.uavs, links);
        updateTable(frame.uavs);
        updateMissionTable(mission);
      }

      function renderFrame() {
        const frame = pickFrameForRender();
        if (!frame) {
          return;
        }
        state.timestamp = frame.timestamp;
        state.uavs = frame.uavs || [];
        state.links = frame.links || [];
        state.fire_hotspots = frame.fire_hotspots || [];
        state.fire_regions = frame.fire_regions || [];
        state.mission_targets = frame.mission_targets || [];
        const avgW = state.links.length
          ? (state.links.reduce((s, x) => s + x.weight, 0) / state.links.length).toFixed(3)
          : 'n/a';
        const maxFire = state.fire_hotspots.length
          ? Math.max(...state.fire_hotspots.map(x => x.intensity || 0)).toFixed(2)
          : 'n/a';
        const frameTime = new Date(state.timestamp).toISOString();
        const replayTag = replayMode === 'realtime'
          ? '实时'
          : `${replayPlaying ? '回放中' : '回放暂停'} ${replayIndex + 1}/${stateHistory.length} @${replaySpeed}x`;

        meta.innerHTML = `timestamp=${state.timestamp} 时间=${frameTime} <span class="badge">uav_count=${state.uavs.length}</span><span class="badge">link_count=${state.links.length}</span><span class="badge">avg_w=${avgW}</span><span class="badge">fire=${state.fire_hotspots.length}</span><span class="badge">fire_regions=${state.fire_regions.length}</span><span class="badge">max_fire=${maxFire}</span><span class="badge">mission=${state.mission_targets.length}</span><span class="badge">basemap=${basemapMode}</span><span class="badge">fire_region=${fireRegionMode ? 'on' : 'off'}</span><span class="badge">timeline=${replayTag}</span>`;
        applyLayerVisibility(state);
        updateTimelineStatus();
      }

      function updateTimelineStatus() {
        if (!stateHistory.length || replayIndex < 0) {
          historyLabel.textContent = '-';
          timelineStatus.textContent = replayMode === 'realtime' ? '实时模式' : '回放模式（无历史帧）';
          return;
        }
        const frame = stateHistory[Math.max(0, Math.min(replayIndex, stateHistory.length - 1))];
        const frameTime = new Date(frame.timestamp || 0).toISOString();
        historyLabel.textContent = `${replayIndex + 1}/${stateHistory.length}`;
        if (replayMode === 'realtime') {
          timelineStatus.textContent = `实时模式 | 缓存=${stateHistory.length}帧`;
        } else {
          timelineStatus.textContent = `${replayPlaying ? '播放中' : '暂停'} | ${frameTime} | ${replaySpeed}x`;
        }
      }

      function updateReplayControlState() {
        const replayActive = replayMode === 'replay';
        const hasHistory = stateHistory.length > 0;
        timelinePlay.disabled = !replayActive || !hasHistory;
        timelinePause.disabled = !replayActive || !hasHistory;
        timelineReset.disabled = !replayActive || !hasHistory;
        timelineSpeed.disabled = !replayActive;
      }

      function refreshReplayView() {
        if (replayMode === 'realtime' && stateHistory.length) {
          replayIndex = stateHistory.length - 1;
          historySlider.value = String(replayIndex);
        }
        updateReplayControlState();
        renderFrame();
      }

      timelineMode.addEventListener('change', () => {
        replayMode = timelineMode.value === 'replay' ? 'replay' : 'realtime';
        if (replayMode === 'realtime') {
          replayPlaying = false;
        } else {
          replayIndex = Math.max(0, stateHistory.length - 1);
          historySlider.value = String(Math.max(0, replayIndex));
        }
        refreshReplayView();
      });
      timelinePlay.addEventListener('click', () => {
        if (replayMode !== 'replay' || !stateHistory.length) return;
        replayPlaying = true;
        lastReplayTickMs = performance.now();
        refreshReplayView();
      });
      timelinePause.addEventListener('click', () => {
        replayPlaying = false;
        refreshReplayView();
      });
      timelineReset.addEventListener('click', () => {
        if (replayMode !== 'replay' || !stateHistory.length) return;
        replayPlaying = false;
        replayAccumulatorMs = 0;
        replayIndex = 0;
        historySlider.value = '0';
        refreshReplayView();
      });
      timelineSpeed.addEventListener('change', () => {
        const nextSpeed = Number(timelineSpeed.value);
        replaySpeed = Number.isFinite(nextSpeed) ? nextSpeed : 1.0;
        updateTimelineStatus();
      });
      showLinks.addEventListener('change', refreshReplayView);
      showFire.addEventListener('change', refreshReplayView);
      showMission.addEventListener('change', refreshReplayView);
      historySlider.addEventListener('input', (e) => {
        if (!stateHistory.length) {
          return;
        }
        replayMode = 'replay';
        timelineMode.value = 'replay';
        replayPlaying = false;
        replayIndex = parseInt(e.target.value, 10);
        refreshReplayView();
      });

      function replayTick() {
        const now = performance.now();
        const dtMs = now - lastReplayTickMs;
        lastReplayTickMs = now;
        if (replayMode === 'replay' && replayPlaying && stateHistory.length > 1) {
          replayAccumulatorMs += dtMs * replaySpeed;
          while (replayAccumulatorMs >= fetchIntervalMs) {
            replayAccumulatorMs -= fetchIntervalMs;
            replayIndex += 1;
            if (replayIndex >= stateHistory.length - 1) {
              replayIndex = stateHistory.length - 1;
              replayPlaying = false;
              break;
            }
          }
          historySlider.value = String(Math.max(0, replayIndex));
          renderFrame();
        }
        requestAnimationFrame(replayTick);
      }

      const entityMap = new Map();
      const polylineMap = new Map();
      const hotspotMap = new Map();
      const fireRegionMap = new Map();
      const missionLineMap = new Map();

      const deckgl = new deck.Deck({
        parent: document.getElementById('deck'),
        controller: false,
        views: new deck.OrthographicView(),
        initialViewState: {target: [0, 0, 0], zoom: 0},
        layers: []
      });

      function statusColor(status) {
        if (status === 1) return [239, 68, 68, 210];
        if (status === 2) return [96, 165, 250, 210];
        return [34, 197, 94, 210];
      }

      function upsertCesiumEntities(uavs) {
        const live = new Set();
        for (const u of uavs) {
          live.add(u.id);
          const lon = u.position[1];
          const lat = u.position[0];
          const alt = u.position[2];
          const color = statusColor(u.status);
          const cesiumColor = Cesium.Color.fromBytes(color[0], color[1], color[2], color[3]);

          let e = entityMap.get(u.id);
          if (!e) {
            e = viewer.entities.add({
              id: u.id,
              position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
              point: { pixelSize: 10, color: cesiumColor, outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
              label: {
                text: u.id,
                font: '14px JetBrains Mono',
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -14)
              }
            });
            entityMap.set(u.id, e);
          } else {
            e.position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
            e.point.color = cesiumColor;
            e.label.text = u.id;
          }
        }

        for (const [id, entity] of entityMap.entries()) {
          if (!live.has(id)) {
            viewer.entities.remove(entity);
            entityMap.delete(id);
          }
        }
      }

      function linkColor(weight) {
        if (weight >= 0.75) return Cesium.Color.fromBytes(34, 197, 94, 220);
        if (weight >= 0.45) return Cesium.Color.fromBytes(245, 158, 11, 220);
        return Cesium.Color.fromBytes(239, 68, 68, 220);
      }

      function upsertCesiumLinks(uavs, links) {
        const posById = new Map();
        for (const u of uavs) {
          posById.set(u.id, u.position);
        }

        const live = new Set();
        for (const l of links) {
          const key = `${l.source}->${l.target}`;
          const a = posById.get(l.source);
          const b = posById.get(l.target);
          if (!a || !b) continue;
          live.add(key);

          const color = linkColor(l.weight);
          const positions = Cesium.Cartesian3.fromDegreesArrayHeights([
            a[1], a[0], a[2],
            b[1], b[0], b[2]
          ]);

          let e = polylineMap.get(key);
          if (!e) {
            e = viewer.entities.add({
              id: `link:${key}`,
              polyline: {
                positions,
                width: 2 + (l.weight * 3.0),
                material: color
              }
            });
            polylineMap.set(key, e);
          } else {
            e.polyline.positions = positions;
            e.polyline.material = color;
            e.polyline.width = 2 + (l.weight * 3.0);
          }
        }

        for (const [k, e] of polylineMap.entries()) {
          if (!live.has(k)) {
            viewer.entities.remove(e);
            polylineMap.delete(k);
          }
        }
      }

      function fireColor(intensity) {
        if (intensity >= 0.85) return Cesium.Color.fromBytes(239, 68, 68, 220);
        if (intensity >= 0.6) return Cesium.Color.fromBytes(245, 158, 11, 220);
        return Cesium.Color.fromBytes(250, 204, 21, 200);
      }

      function upsertFireHotspots(hotspots) {
        const live = new Set();
        for (const h of hotspots || []) {
          live.add(h.id);
          const lon = h.position[1];
          const lat = h.position[0];
          const alt = h.position[2];
          const color = fireColor(h.intensity || 0);
          const intensity = (h.intensity || 0.5);
          const pixel = 20 + Math.round(intensity * 20);
          const radius = 60 + intensity * 120;
          let e = hotspotMap.get(h.id);
          if (!e) {
            e = viewer.entities.add({
              id: `fire:${h.id}`,
              position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
              point: { pixelSize: pixel, color, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
              polyline: {
                positions: Cesium.Cartesian3.fromDegreesArrayHeights([lon, lat, 0, lon, lat, alt]),
                width: 2,
                material: Cesium.Color.fromBytes(239, 68, 68, 180)
              },
              ellipse: {
                semiMinorAxis: radius,
                semiMajorAxis: radius,
                height: 0,
                material: Cesium.Color.fromBytes(239, 68, 68, 52),
                outline: true,
                outlineColor: Cesium.Color.fromBytes(239, 68, 68, 180),
                outlineWidth: 1
              },
              label: {
                text: `FIRE ${h.id}`,
                font: '13px JetBrains Mono',
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.TOP,
                pixelOffset: new Cesium.Cartesian2(0, 14)
              }
            });
            hotspotMap.set(h.id, e);
          } else {
            e.position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
            e.point.pixelSize = pixel;
            e.point.color = color;
            e.polyline.positions = Cesium.Cartesian3.fromDegreesArrayHeights([lon, lat, 0, lon, lat, alt]);
            e.ellipse.semiMinorAxis = radius;
            e.ellipse.semiMajorAxis = radius;
          }
        }
        for (const [id, entity] of hotspotMap.entries()) {
          if (!live.has(id)) {
            viewer.entities.remove(entity);
            hotspotMap.delete(id);
          }
        }
      }

      function fireRegionColor(intensity) {
        if (intensity >= 0.85) return Cesium.Color.fromBytes(185, 28, 28, 60);
        if (intensity >= 0.6) return Cesium.Color.fromBytes(217, 119, 6, 56);
        return Cesium.Color.fromBytes(202, 138, 4, 52);
      }

      function upsertFireRegions(regions) {
        if (!fireRegionMode) {
          for (const [k, e] of fireRegionMap.entries()) {
            viewer.entities.remove(e);
            fireRegionMap.delete(k);
          }
          return;
        }

        const live = new Set();
        for (const r of regions || []) {
          const rid = r.id || 'region';
          live.add(rid);
          const center = r.center || [0, 0, 0];
          const lat = center[0];
          const lon = center[1];
          const alt = center[2] || 0;
          const radius = Math.max(80.0, Number(r.radius_m || 120.0));
          const color = fireRegionColor(Number(r.intensity || 0));
          const label = `REGION ${rid} r=${radius.toFixed(0)}m n=${Number(r.member_count || 0)}`;
          let e = fireRegionMap.get(rid);
          if (!e) {
            e = viewer.entities.add({
              id: `fire_region:${rid}`,
              position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
              ellipse: {
                semiMinorAxis: radius,
                semiMajorAxis: radius,
                height: 0,
                material: color,
                outline: true,
                outlineColor: Cesium.Color.fromBytes(220, 38, 38, 120),
                outlineWidth: 1
              },
              label: {
                text: label,
                font: '12px JetBrains Mono',
                fillColor: Cesium.Color.fromBytes(252, 165, 165, 230),
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -6)
              }
            });
            fireRegionMap.set(rid, e);
          } else {
            e.position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
            e.ellipse.semiMinorAxis = radius;
            e.ellipse.semiMajorAxis = radius;
            e.ellipse.material = color;
            e.label.text = label;
          }
        }
        for (const [id, entity] of fireRegionMap.entries()) {
          if (!live.has(id)) {
            viewer.entities.remove(entity);
            fireRegionMap.delete(id);
          }
        }
      }

      function upsertMissionLines(uavs, targets) {
        const uavById = new Map();
        for (const u of uavs) uavById.set(u.id, u.position);
        const live = new Set();
        for (const t of targets || []) {
          const up = uavById.get(t.uav_id);
          if (!up) continue;
          const key = t.uav_id;
          live.add(key);
          const positions = Cesium.Cartesian3.fromDegreesArrayHeights([
            up[1], up[0], up[2],
            t.position[1], t.position[0], t.position[2]
          ]);
          let e = missionLineMap.get(key);
          if (!e) {
            e = viewer.entities.add({
              id: `mission:${key}`,
              polyline: {
                positions,
                width: 2,
                material: new Cesium.PolylineDashMaterialProperty({
                  color: Cesium.Color.fromBytes(59, 130, 246, 220),
                  dashLength: 12
                })
              }
            });
            missionLineMap.set(key, e);
          } else {
            e.polyline.positions = positions;
          }
        }
        for (const [k, e] of missionLineMap.entries()) {
          if (!live.has(k)) {
            viewer.entities.remove(e);
            missionLineMap.delete(k);
          }
        }
      }

      function updateDeck(uavs, links) {
        const data = uavs.map((u, i) => ({
          x: i,
          y: u.position[2],
          id: u.id,
          status: u.status,
          battery: u.battery
        }));
        const indexById = new Map(data.map((d, i) => [d.id, i]));
        const linkData = (links || [])
          .filter(l => indexById.has(l.source) && indexById.has(l.target))
          .map(l => ({
            source: [indexById.get(l.source), 12],
            target: [indexById.get(l.target), 12],
            weight: l.weight
          }));

        deckgl.setProps({
          initialViewState: {
            target: [Math.max(0, (data.length - 1) / 2), 100, 0],
            zoom: -1
          },
          layers: [
            new deck.ArcLayer({
              id: 'link-arc-panel',
              data: linkData,
              getSourcePosition: d => d.source,
              getTargetPosition: d => d.target,
              getSourceColor: d => d.weight >= 0.6 ? [34, 197, 94, 170] : [245, 158, 11, 170],
              getTargetColor: d => d.weight >= 0.6 ? [34, 197, 94, 170] : [239, 68, 68, 170],
              getWidth: d => 1 + d.weight * 3
            }),
            new deck.ScatterplotLayer({
              id: 'alt-panel',
              data,
              getPosition: d => [d.x, d.y],
              getFillColor: d => statusColor(d.status),
              getRadius: d => 10 + (d.battery * 0.15),
              radiusUnits: 'pixels',
              pickable: true,
              onHover: info => {
                const d = info.object;
                if (d) {
                  meta.textContent = `timestamp=${state.timestamp} uav_count=${state.uavs.length} | hover=${d.id} alt=${d.y.toFixed(1)} battery=${d.battery.toFixed(1)}`;
                }
              }
            })
          ]
        });
      }

      function updateTable(uavs) {
        rows.innerHTML = '';
        for (const u of uavs) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.id}</td><td>${u.position[0].toFixed(6)}</td><td>${u.position[1].toFixed(6)}</td><td>${u.position[2].toFixed(1)}</td><td class="status-${u.status}">${u.status}</td>`;
          rows.appendChild(tr);
        }
      }

      function updateMissionTable(targets) {
        missionRows.innerHTML = '';
        if (!targets.length) {
          missionRows.innerHTML = '<tr><td colspan="3">当前无任务</td></tr>';
          return;
        }
        for (const t of targets) {
          const tr = document.createElement('tr');
          const reason = t.reason || '未给出';
          const priority = Number(t.priority || 0).toFixed(3);
          tr.innerHTML = `<td>${t.uav_id}</td><td>${priority}</td><td>${reason}</td>`;
          missionRows.appendChild(tr);
        }
      }

      async function tick() {
        try {
          const res = await fetch('/api/swarm_state', {cache: 'no-store'});
          const next = await res.json();
          addHistoryFrame({
            timestamp: next.timestamp || 0,
            uavs: next.uavs || [],
            links: next.links || [],
            fire_hotspots: next.fire_hotspots || [],
            fire_regions: next.fire_regions || [],
            mission_targets: next.mission_targets || []
          });
          renderFrame();
        } catch (_) {
          meta.textContent = '数据流中断，等待恢复...';
        }
      }

      setInterval(tick, 500);
      tick();
      requestAnimationFrame(replayTick);
    </script>
  </body>
</html>
