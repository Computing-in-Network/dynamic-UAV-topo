<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Cesium + Deck.gl</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.138.0/Build/Cesium/Widgets/widgets.css" />
    <style>
      :root {
        --bg: #050816;
        --panel: #0e1a30;
        --line: #2c4a8c;
        --text: #e6eefc;
        --muted: #8aa4d9;
        --ok: #22c55e;
        --warn: #ef4444;
        --landed: #60a5fa;
      }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 5% 5%, #1b3064, var(--bg));
      }
      .layout {
        height: 100%;
        display: grid;
        grid-template-columns: 2.3fr 1fr;
        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
      }
      .map-card, .side-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: color-mix(in srgb, var(--panel) 90%, #ffffff 10%);
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .side-inner {
        display: grid;
        grid-template-rows: auto auto auto 180px 1fr;
        height: 100%;
      }
      .legend {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 12px;
        color: var(--text);
      }
      .legend-title {
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }
      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        border: 1px solid rgba(255,255,255,0.45);
      }
      .swatch-high { background: rgba(239,68,68,0.95); }
      .swatch-mid { background: rgba(245,158,11,0.95); }
      .swatch-low { background: rgba(250,204,21,0.95); }
      .legend-max {
        margin-top: 6px;
        color: var(--muted);
        font-family: "JetBrains Mono", monospace;
      }
      .raw-panel {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 12px;
        opacity: 0.82;
      }
      .raw-title {
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .raw-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 6px;
      }
      .raw-list {
        max-height: 76px;
        overflow: auto;
        font-family: "JetBrains Mono", monospace;
        color: #c9dbff;
      }
      .raw-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 0;
      }
      .trend-up { color: #ef4444; }
      .trend-down { color: #22c55e; }
      .trend-same { color: #8aa4d9; }
      .meta {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
      }
      .layers {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .presets {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .preset-btn {
        border: 1px solid var(--line);
        background: rgba(7, 17, 39, 0.45);
        color: var(--text);
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 11px;
        cursor: pointer;
      }
      .preset-btn.active {
        border-color: #60a5fa;
        box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.45);
      }
      .layers label {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(7, 17, 39, 0.35);
      }
      #deck {
        border-bottom: 1px solid var(--line);
        position: relative;
      }
      .table-wrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th, td {
        padding: 8px;
        border-bottom: 1px dashed #284888;
        text-align: left;
      }
      .status-0 { color: var(--ok); }
      .status-1 { color: var(--warn); }
      .status-2 { color: var(--landed); }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 11px;
      }
      @media (max-width: 1024px) {
        .layout { grid-template-columns: 1fr; }
        .side-inner { grid-template-rows: auto auto auto 150px 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="map-card"><div id="map"></div></div>
      <div class="side-card">
        <div class="side-inner">
          <div class="meta" id="meta">初始化中...</div>
          <div class="legend" id="legend">
            <div class="legend-title">火情强度图例（intensity）</div>
            <div class="legend-row"><span class="legend-swatch swatch-high"></span><span>高危：>= 0.85</span></div>
            <div class="legend-row"><span class="legend-swatch swatch-mid"></span><span>中危：0.60 - 0.84</span></div>
            <div class="legend-row"><span class="legend-swatch swatch-low"></span><span>低危：< 0.60</span></div>
            <div class="legend-max" id="legend-max">max_fire=n/a</div>
          </div>
          <div class="raw-panel" id="raw-panel">
            <div class="raw-title">FDS 原始层（/env/fds_raw）</div>
            <div class="raw-stats" id="raw-stats">
              <span class="badge">sensors=0</span><span class="badge">max=n/a</span><span class="badge">min=n/a</span><span class="badge">avg=n/a</span>
            </div>
            <div class="raw-list" id="raw-list">等待 FDS 原始数据...</div>
          </div>
          <div id="deck"></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Lat</th><th>Lon</th><th>Alt</th><th>UAV</th><th>Mission</th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Prefer jsDelivr in this environment; keep unpkg as runtime fallback.
      window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.138.0/Build/Cesium/';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/cesium@1.138.0/Build/Cesium/Cesium.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/deck.gl@8.9.36/dist.min.js"></script>
    <script>
      if (!window.Cesium) {
        document.write('<script>window.CESIUM_BASE_URL="https://unpkg.com/cesium@1.138.0/Build/Cesium/";<\/script>');
        document.write('<script src="https://unpkg.com/cesium@1.138.0/Build/Cesium/Cesium.js"><\/script>');
      }
      if (!window.deck) {
        document.write('<script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"><\/script>');
      }

      const state = {
        timestamp: 0,
        uavs: [],
        links: [],
        fire_hotspots: [],
        mission_targets: [],
        mission_status: [],
        fds_raw: {}
      };
      const rows = document.getElementById('rows');
      const meta = document.getElementById('meta');
      const legendMax = document.getElementById('legend-max');
      const rawStats = document.getElementById('raw-stats');
      const rawList = document.getElementById('raw-list');
      const rawPrevValues = new Map();
      const layerState = {
        showHotspot: true,
        showRegion: true,
        showMission: true,
        showRaw: true
      };
      let activePreset = 'task';
      let basemapMode = 'OSM';
      let terrainMode = 'FLAT';
      let osmErrorCount = 0;
      let controlsInstalled = false;
      const params = new URLSearchParams(window.location.search);
      const forceBasemap = params.get('basemap');
      const terrainParam = (params.get('terrain') || 'auto').toLowerCase();
      const ionToken = (params.get('ion_token') || '').trim();

      Cesium.Ion.defaultAccessToken = ionToken || undefined;
      const osmProvider = new Cesium.OpenStreetMapImageryProvider({
        // Use local tile proxy to avoid browser-side CDN/proxy instability.
        url: '/tiles/osm/'
      });
      const fallbackProvider = new Cesium.GridImageryProvider({
        cells: 16,
        color: Cesium.Color.fromCssColorString('#35548f'),
        glowColor: Cesium.Color.fromCssColorString('#203a71'),
        glowWidth: 6,
        backgroundColor: Cesium.Color.fromCssColorString('#071127')
      });
      const viewer = new Cesium.Viewer('map', {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: true,
        sceneModePicker: false,
        navigationHelpButton: false,
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        imageryProvider: osmProvider
      });
      viewer.scene.globe.depthTestAgainstTerrain = false;
      viewer.scene.globe.enableLighting = false;

      async function tryEnableWorldTerrain() {
        if (!Cesium.createWorldTerrainAsync) return;
        try {
          const terrain = await Cesium.createWorldTerrainAsync({
            requestVertexNormals: true
          });
          viewer.terrainProvider = terrain;
          viewer.scene.globe.depthTestAgainstTerrain = true;
          viewer.scene.globe.enableLighting = true;
          if (typeof viewer.scene.verticalExaggeration === 'number') {
            viewer.scene.verticalExaggeration = 1.35;
          }
          terrainMode = 'WORLD';
        } catch (_) {
          terrainMode = 'FLAT';
        }
      }

      if (terrainParam === 'world' || (terrainParam === 'auto' && ionToken)) {
        tryEnableWorldTerrain();
      }

      function switchToFallbackBasemap() {
        if (basemapMode === 'GRID') return;
        basemapMode = 'GRID';
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(fallbackProvider);
      }
      function switchToOsmBasemap() {
        basemapMode = 'OSM';
        osmErrorCount = 0;
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(osmProvider);
      }
      async function probeOsmAndRecover() {
        if (forceBasemap === 'grid' || basemapMode !== 'GRID') return;
        try {
          const resp = await fetch('/tiles/osm/0/0/0.png', { cache: 'no-store' });
          if (resp.ok) {
            switchToOsmBasemap();
          }
        } catch (_) {
          // keep fallback basemap until next probe succeeds
        }
      }

      if (forceBasemap === 'grid') {
        switchToFallbackBasemap();
      } else {
        switchToOsmBasemap();
      }

      // Avoid false fallback on transient tile errors: only switch after repeated failures.
      osmProvider.errorEvent.addEventListener(() => {
        if (forceBasemap === 'osm') {
          return;
        }
        osmErrorCount += 1;
        if (osmErrorCount >= 25) {
          switchToFallbackBasemap();
        }
      });
      if (forceBasemap !== 'grid') {
        setInterval(probeOsmAndRecover, 10000);
      }

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(116.4074, 39.9042, 26000.0),
        orientation: {
          heading: Cesium.Math.toRadians(18.0),
          pitch: Cesium.Math.toRadians(-42.0),
          roll: 0.0
        }
      });

      const entityMap = new Map();
      const polylineMap = new Map();
      const hotspotMap = new Map();
      const fireSubpointMap = new Map();
      const fireClusterMap = new Map();
      const missionLineMap = new Map();
      const hotspotRegionState = new Map();
      const OBSERVE_RADIUS_M = 220.0;
      const FIRE_THRESH = {
        high: 0.85,
        mid: 0.60
      };
      const FLAME_ICON = `data:image/svg+xml;utf8,${encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
        '<path fill="#ff4d2e" d="M34 4c2 8-2 12-6 18-4 6-4 11-1 16 2-3 5-5 8-6-2 5-1 8 2 11 3 4 4 8 4 12 0 8-6 13-13 13s-13-5-13-13c0-7 4-12 8-17 5-7 10-12 11-24z"/>' +
        '<path fill="#ffb02e" d="M33 30c5 5 8 9 8 15 0 7-5 12-12 12s-12-5-12-12c0-4 2-8 6-12 2 7 7 10 10-3z"/>' +
        '<circle cx="30" cy="49" r="6" fill="#fff4b3"/>' +
        '</svg>'
      )}`;

      function installLayerToggles() {
        if (controlsInstalled) return;
        controlsInstalled = true;
        meta.innerHTML = `<div id="meta-status">初始化中...</div>`;
        const statusEl = document.getElementById('meta-status');
        if (!statusEl) return;
        const wrap = document.createElement('div');
        wrap.className = 'layers';
        wrap.innerHTML = `
          <label><input type="checkbox" id="ly-hotspot" />热点点</label>
          <label><input type="checkbox" id="ly-region" checked />火区面</label>
          <label><input type="checkbox" id="ly-mission" checked />任务线</label>
          <label><input type="checkbox" id="ly-raw" checked />FDS原始层</label>
        `;
        meta.appendChild(wrap);
        const presets = document.createElement('div');
        presets.className = 'presets';
        presets.innerHTML = `
          <button class="preset-btn active" id="preset-task">任务视图</button>
          <button class="preset-btn" id="preset-fire">火情视图</button>
          <button class="preset-btn" id="preset-debug">调试视图</button>
        `;
        meta.appendChild(presets);
        document.getElementById('ly-hotspot').addEventListener('change', (e) => {
          layerState.showHotspot = !!e.target.checked;
          activePreset = '';
          syncPresetButtons();
        });
        document.getElementById('ly-region').addEventListener('change', (e) => {
          layerState.showRegion = !!e.target.checked;
          activePreset = '';
          syncPresetButtons();
        });
        document.getElementById('ly-mission').addEventListener('change', (e) => {
          layerState.showMission = !!e.target.checked;
          activePreset = '';
          syncPresetButtons();
        });
        document.getElementById('ly-raw').addEventListener('change', (e) => {
          layerState.showRaw = !!e.target.checked;
          setRawPanelVisibility();
          activePreset = '';
          syncPresetButtons();
        });
        document.getElementById('preset-task').addEventListener('click', () => applyPreset('task'));
        document.getElementById('preset-fire').addEventListener('click', () => applyPreset('fire'));
        document.getElementById('preset-debug').addEventListener('click', () => applyPreset('debug'));
        applyPreset('task');
      }

      function syncPresetButtons() {
        const map = new Map([
          ['preset-task', 'task'],
          ['preset-fire', 'fire'],
          ['preset-debug', 'debug']
        ]);
        for (const [id, name] of map.entries()) {
          const btn = document.getElementById(id);
          if (!btn) continue;
          btn.classList.toggle('active', activePreset === name);
        }
      }

      function syncLayerCheckboxes() {
        const hot = document.getElementById('ly-hotspot');
        const reg = document.getElementById('ly-region');
        const mis = document.getElementById('ly-mission');
        const raw = document.getElementById('ly-raw');
        if (hot) hot.checked = layerState.showHotspot;
        if (reg) reg.checked = layerState.showRegion;
        if (mis) mis.checked = layerState.showMission;
        if (raw) raw.checked = layerState.showRaw;
      }

      function setRawPanelVisibility() {
        const panel = document.getElementById('raw-panel');
        if (!panel) return;
        panel.style.display = layerState.showRaw ? '' : 'none';
      }

      function applyPreset(name) {
        activePreset = name;
        if (name === 'task') {
          layerState.showMission = true;
          layerState.showRegion = true;
          layerState.showHotspot = true;
          layerState.showRaw = false;
        } else if (name === 'fire') {
          layerState.showMission = false;
          layerState.showRegion = true;
          layerState.showHotspot = true;
          layerState.showRaw = true;
        } else {
          layerState.showMission = true;
          layerState.showRegion = true;
          layerState.showHotspot = true;
          layerState.showRaw = true;
        }
        syncLayerCheckboxes();
        setRawPanelVisibility();
        syncPresetButtons();
      }
      installLayerToggles();

      const deckgl = new deck.Deck({
        parent: document.getElementById('deck'),
        controller: false,
        views: new deck.OrthographicView(),
        initialViewState: {target: [0, 0, 0], zoom: 0},
        layers: []
      });

      function statusColor(status) {
        if (status === 1) return [239, 68, 68, 210];
        if (status === 2) return [96, 165, 250, 210];
        return [34, 197, 94, 210];
      }

      function missionStateText(v) {
        if (v === 1) return 'ASSIGNED';
        if (v === 2) return 'EXECUTING';
        if (v === 3) return 'COMPLETED';
        if (v === 4) return 'FAILED';
        return 'IDLE';
      }

      function upsertCesiumEntities(uavs) {
        const live = new Set();
        for (const u of uavs) {
          live.add(u.id);
          const lon = u.position[1];
          const lat = u.position[0];
          const alt = u.position[2];
          const color = statusColor(u.status);
          const cesiumColor = Cesium.Color.fromBytes(color[0], color[1], color[2], color[3]);

          let e = entityMap.get(u.id);
          if (!e) {
            e = viewer.entities.add({
              id: u.id,
              position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
              point: { pixelSize: 10, color: cesiumColor, outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
              label: {
                text: u.id,
                font: '14px JetBrains Mono',
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -14)
              }
            });
            entityMap.set(u.id, e);
          } else {
            e.position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
            e.point.color = cesiumColor;
            e.label.text = u.id;
          }
        }

        for (const [id, entity] of entityMap.entries()) {
          if (!live.has(id)) {
            viewer.entities.remove(entity);
            entityMap.delete(id);
          }
        }
      }

      function linkColor(weight) {
        if (weight >= 0.75) return Cesium.Color.fromBytes(34, 197, 94, 220);
        if (weight >= 0.45) return Cesium.Color.fromBytes(245, 158, 11, 220);
        return Cesium.Color.fromBytes(239, 68, 68, 220);
      }

      function upsertCesiumLinks(uavs, links) {
        const posById = new Map();
        for (const u of uavs) {
          posById.set(u.id, u.position);
        }

        const live = new Set();
        for (const l of links) {
          const key = `${l.source}->${l.target}`;
          const a = posById.get(l.source);
          const b = posById.get(l.target);
          if (!a || !b) continue;
          live.add(key);

          const color = linkColor(l.weight);
          const positions = Cesium.Cartesian3.fromDegreesArrayHeights([
            a[1], a[0], a[2],
            b[1], b[0], b[2]
          ]);

          let e = polylineMap.get(key);
          if (!e) {
            e = viewer.entities.add({
              id: `link:${key}`,
              polyline: {
                positions,
                width: 2 + (l.weight * 3.0),
                material: color
              }
            });
            polylineMap.set(key, e);
          } else {
            e.polyline.positions = positions;
            e.polyline.material = color;
            e.polyline.width = 2 + (l.weight * 3.0);
          }
        }

        for (const [k, e] of polylineMap.entries()) {
          if (!live.has(k)) {
            viewer.entities.remove(e);
            polylineMap.delete(k);
          }
        }
      }

      function fireColor(intensity) {
        if (intensity >= FIRE_THRESH.high) return Cesium.Color.fromBytes(239, 68, 68, 220);
        if (intensity >= FIRE_THRESH.mid) return Cesium.Color.fromBytes(245, 158, 11, 220);
        return Cesium.Color.fromBytes(250, 204, 21, 200);
      }

      function approxDistanceMeters(aPos, bPos) {
        const dLatM = (aPos[0] - bPos[0]) * 111000.0;
        const latMid = (aPos[0] + bPos[0]) * 0.5 * Math.PI / 180.0;
        const dLonM = (aPos[1] - bPos[1]) * 111000.0 * Math.max(0.15, Math.cos(latMid));
        const dAltM = (aPos[2] || 0) - (bPos[2] || 0);
        return Math.sqrt(dLatM * dLatM + dLonM * dLonM + dAltM * dAltM);
      }

      function nearestUavDistanceMeters(hotspotPos, uavs) {
        let minD = Number.POSITIVE_INFINITY;
        for (const u of uavs || []) {
          const d = approxDistanceMeters(hotspotPos, u.position || [0, 0, 0]);
          if (d < minD) minD = d;
        }
        return minD;
      }

      function dynamicFireRadius(hotspotId, intensity, spread, nearestUavM, nowMs) {
        const targetRadius = 90 + intensity * 260 + spread * 90;
        const prev = hotspotRegionState.get(hotspotId) || {
          radius: Math.max(80, targetRadius * 0.75),
          lastTs: nowMs
        };
        const dt = Math.max(0.02, Math.min(2.0, (nowMs - prev.lastTs) / 1000.0));
        const observed = Number.isFinite(nearestUavM) && nearestUavM <= OBSERVE_RADIUS_M;
        const responseBoost = observed ? 1.7 : 1.0;
        const growRate = (14 + spread * 28) * responseBoost;
        const shrinkRate = (10 + Math.max(0.0, 1.0 - intensity) * 22) * responseBoost;
        let radius = prev.radius;
        if (targetRadius > radius) {
          radius = Math.min(targetRadius, radius + growRate * dt);
        } else {
          radius = Math.max(targetRadius, radius - shrinkRate * dt);
        }
        radius = Math.max(50, Math.min(2200, radius));
        hotspotRegionState.set(hotspotId, { radius, lastTs: nowMs });
        return { radius, observed };
      }

      function offsetMetersToLatLon(baseLat, baseLon, dxM, dyM) {
        const lat = baseLat + (dyM / 111000.0);
        const lonScale = 111000.0 * Math.max(0.15, Math.cos(baseLat * Math.PI / 180.0));
        const lon = baseLon + (dxM / lonScale);
        return [lat, lon];
      }

      function hashString(s) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < s.length; i += 1) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function toLocalMeters(lat, lon, lat0, lon0) {
        const x = (lon - lon0) * 111000.0 * Math.max(0.15, Math.cos(lat0 * Math.PI / 180.0));
        const y = (lat - lat0) * 111000.0;
        return [x, y];
      }

      function fromLocalMeters(x, y, lat0, lon0) {
        const lat = lat0 + y / 111000.0;
        const lon = lon0 + x / (111000.0 * Math.max(0.15, Math.cos(lat0 * Math.PI / 180.0)));
        return [lat, lon];
      }

      function cross(o, a, b) {
        return (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
      }

      function convexHull(points) {
        if (points.length <= 3) return points.slice();
        const pts = points.slice().sort((p, q) => (p[0] - q[0]) || (p[1] - q[1]));
        const lower = [];
        for (const p of pts) {
          while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
            lower.pop();
          }
          lower.push(p);
        }
        const upper = [];
        for (let i = pts.length - 1; i >= 0; i -= 1) {
          const p = pts[i];
          while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
            upper.pop();
          }
          upper.push(p);
        }
        lower.pop();
        upper.pop();
        return lower.concat(upper);
      }

      function smoothClosedPolygon(points, iterations) {
        let out = points.slice();
        for (let it = 0; it < iterations; it += 1) {
          const next = [];
          for (let i = 0; i < out.length; i += 1) {
            const a = out[i];
            const b = out[(i + 1) % out.length];
            next.push([0.75 * a[0] + 0.25 * b[0], 0.75 * a[1] + 0.25 * b[1]]);
            next.push([0.25 * a[0] + 0.75 * b[0], 0.25 * a[1] + 0.75 * b[1]]);
          }
          out = next;
        }
        return out;
      }

      function shouldMergeSeeds(a, b) {
        const d = approxDistanceMeters([a.lat, a.lon, 0], [b.lat, b.lon, 0]);
        const overlapThreshold = 35.0 + 0.58 * (Math.max(40, a.radius) + Math.max(40, b.radius));
        return d <= overlapThreshold;
      }

      function clusterFireSeeds(seeds) {
        const clusters = [];
        const used = new Array(seeds.length).fill(false);
        for (let i = 0; i < seeds.length; i += 1) {
          if (used[i]) continue;
          const queue = [i];
          used[i] = true;
          const idx = [];
          while (queue.length) {
            const cur = queue.pop();
            idx.push(cur);
            for (let j = 0; j < seeds.length; j += 1) {
              if (used[j]) continue;
              if (shouldMergeSeeds(seeds[cur], seeds[j])) {
                used[j] = true;
                queue.push(j);
              }
            }
          }
          clusters.push(idx.map(k => seeds[k]));
        }
        return clusters;
      }

      function upsertFireClusters(seeds) {
        const live = new Set();
        const clusters = clusterFireSeeds(seeds).filter(c => c.length >= 6);
        for (let i = 0; i < clusters.length; i += 1) {
          const c = clusters[i];
          const key = `cluster:${c.map(x => x.id).sort().join('|')}:${i}`;
          live.add(key);
          const lat0 = c.reduce((s, x) => s + x.lat, 0) / c.length;
          const lon0 = c.reduce((s, x) => s + x.lon, 0) / c.length;
          const support = [];
          for (const s of c) {
            const r = Math.max(8.0, Math.min(42.0, (s.radius || 20.0) * 0.35));
            for (let k = 0; k < 20; k += 1) {
              const a = (2 * Math.PI * k) / 20;
              const dx = Math.cos(a) * r;
              const dy = Math.sin(a) * r;
              const [plat, plon] = offsetMetersToLatLon(s.lat, s.lon, dx, dy);
              support.push(toLocalMeters(plat, plon, lat0, lon0));
            }
          }
          const hull = smoothClosedPolygon(convexHull(support), 2);
          if (hull.length < 3) {
            continue;
          }
          const hierarchy = hull.map(([x, y]) => {
            const [hLat, hLon] = fromLocalMeters(x, y, lat0, lon0);
            return Cesium.Cartesian3.fromDegrees(hLon, hLat, 0);
          });
          let e = fireClusterMap.get(key);
          if (!e) {
            e = viewer.entities.add({
              id: `fire_cluster:${key}`,
              polygon: {
                hierarchy,
                material: Cesium.Color.fromBytes(251, 146, 60, 42),
                outline: false,
                show: layerState.showRegion
              }
            });
            fireClusterMap.set(key, e);
          } else {
            e.polygon.hierarchy = hierarchy;
            e.polygon.show = layerState.showRegion;
          }
        }
        for (const [k, e] of fireClusterMap.entries()) {
          if (!live.has(k)) {
            viewer.entities.remove(e);
            fireClusterMap.delete(k);
          }
        }
      }

      function upsertFireHotspots(hotspots, uavs, nowMs) {
        const live = new Set();
        const liveSub = new Set();
        const clusterSeeds = [];
        let areaM2 = 0.0;
        let observedCount = 0;
        for (const h of hotspots || []) {
          live.add(h.id);
          const lon = h.position[1];
          const lat = h.position[0];
          const color = fireColor(h.intensity || 0);
          const intensity = (h.intensity || 0.5);
          const spread = Math.max(0, h.spread_mps || 0);
          const nearestUavM = nearestUavDistanceMeters(h.position || [lat, lon, 0], uavs);
          const dyn = dynamicFireRadius(h.id, intensity, spread, nearestUavM, nowMs);
          const radius = dyn.radius;
          areaM2 += Math.PI * radius * radius;
          if (dyn.observed) observedCount += 1;

          // Generate multiple ground fire points for each hotspot.
          const subCount = 12 + Math.round(intensity * 14);
          const base = hashString(h.id);
          const spreadR = Math.max(22.0, Math.min(170.0, radius * 0.42));
          for (let i = 0; i < subCount; i += 1) {
            const a0 = ((base % 360) * Math.PI / 180.0) + (2 * Math.PI * i / subCount);
            const t = nowMs / 1000.0;
            const wobble = 0.18 * Math.sin(t * 0.5 + i * 0.73);
            const r0 = spreadR * (0.28 + 0.72 * ((i % 5) / 4));
            const r = r0 * (1.0 + wobble);
            const dx = Math.cos(a0 + wobble) * r;
            const dy = Math.sin(a0 - wobble) * r * (0.78 + 0.22 * Math.sin(0.3 * i));
            const [sLat, sLon] = offsetMetersToLatLon(lat, lon, dx, dy);
            const sid = `${h.id}:s${i}`;
            liveSub.add(sid);
            clusterSeeds.push({ id: sid, lat: sLat, lon: sLon, radius: 16 + intensity * 12, intensity });
            let se = fireSubpointMap.get(sid);
            if (!se) {
              se = viewer.entities.add({
                id: `fire_sub:${sid}`,
                position: Cesium.Cartesian3.fromDegrees(sLon, sLat, 0),
                billboard: {
                  image: FLAME_ICON,
                  scale: 0.08 + intensity * 0.08,
                  verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                  pixelOffset: new Cesium.Cartesian2(0, -1),
                  show: layerState.showHotspot
                }
              });
              fireSubpointMap.set(sid, se);
            } else {
              se.position = Cesium.Cartesian3.fromDegrees(sLon, sLat, 0);
              se.billboard.scale = 0.08 + intensity * 0.08;
              se.billboard.show = layerState.showHotspot;
            }
          }

          let e = hotspotMap.get(h.id);
          if (!e) {
            e = viewer.entities.add({
              id: `fire:${h.id}`,
              position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
              billboard: {
                image: FLAME_ICON,
                scale: 0.12 + intensity * 0.12,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -2),
                show: layerState.showHotspot
              },
              label: {
                text: `FIRE ${h.id}`,
                font: '13px JetBrains Mono',
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.TOP,
                pixelOffset: new Cesium.Cartesian2(0, 14),
                show: layerState.showHotspot
              }
            });
            hotspotMap.set(h.id, e);
          } else {
            e.position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);
            e.billboard.scale = 0.12 + intensity * 0.12;
            e.billboard.show = layerState.showHotspot;
            e.label.show = layerState.showHotspot;
          }

        }
        for (const [id, entity] of hotspotMap.entries()) {
          if (!live.has(id)) {
            viewer.entities.remove(entity);
            hotspotMap.delete(id);
            hotspotRegionState.delete(id);
          }
        }
        for (const [sid, entity] of fireSubpointMap.entries()) {
          if (!liveSub.has(sid)) {
            viewer.entities.remove(entity);
            fireSubpointMap.delete(sid);
          }
        }
        upsertFireClusters(clusterSeeds);
        return {
          areaKm2: (areaM2 / 1_000_000.0),
          observedCount
        };
      }

      function upsertMissionLines(uavs, targets) {
        const uavById = new Map();
        for (const u of uavs) uavById.set(u.id, u.position);
        const live = new Set();
        for (const t of targets || []) {
          const up = uavById.get(t.uav_id);
          if (!up) continue;
          const key = t.uav_id;
          live.add(key);
          const positions = Cesium.Cartesian3.fromDegreesArrayHeights([
            up[1], up[0], up[2],
            t.position[1], t.position[0], t.position[2]
          ]);
          let e = missionLineMap.get(key);
          if (!e) {
            e = viewer.entities.add({
              id: `mission:${key}`,
              polyline: {
                positions,
                width: 2,
                material: new Cesium.PolylineDashMaterialProperty({
                  color: Cesium.Color.fromBytes(59, 130, 246, 220),
                  dashLength: 12
                }),
                show: layerState.showMission
              }
            });
            missionLineMap.set(key, e);
          } else {
            e.polyline.positions = positions;
            e.polyline.show = layerState.showMission;
          }
        }
        for (const [k, e] of missionLineMap.entries()) {
          if (!live.has(k)) {
            viewer.entities.remove(e);
            missionLineMap.delete(k);
          }
        }
      }

      function updateDeck(uavs, links) {
        const data = uavs.map((u, i) => ({
          x: i,
          y: u.position[2],
          id: u.id,
          status: u.status,
          battery: u.battery
        }));
        const indexById = new Map(data.map((d, i) => [d.id, i]));
        const linkData = (links || [])
          .filter(l => indexById.has(l.source) && indexById.has(l.target))
          .map(l => ({
            source: [indexById.get(l.source), 12],
            target: [indexById.get(l.target), 12],
            weight: l.weight
          }));

        deckgl.setProps({
          initialViewState: {
            target: [Math.max(0, (data.length - 1) / 2), 100, 0],
            zoom: -1
          },
          layers: [
            new deck.ArcLayer({
              id: 'link-arc-panel',
              data: linkData,
              getSourcePosition: d => d.source,
              getTargetPosition: d => d.target,
              getSourceColor: d => d.weight >= 0.6 ? [34, 197, 94, 170] : [245, 158, 11, 170],
              getTargetColor: d => d.weight >= 0.6 ? [34, 197, 94, 170] : [239, 68, 68, 170],
              getWidth: d => 1 + d.weight * 3
            }),
            new deck.ScatterplotLayer({
              id: 'alt-panel',
              data,
              getPosition: d => [d.x, d.y],
              getFillColor: d => statusColor(d.status),
              getRadius: d => 10 + (d.battery * 0.15),
              radiusUnits: 'pixels',
              pickable: true,
              onHover: info => {
                const d = info.object;
                if (d) {
                  const statusEl = document.getElementById('meta-status');
                  if (statusEl) {
                    statusEl.textContent = `timestamp=${state.timestamp} uav_count=${state.uavs.length} hover=${d.id} alt=${d.y.toFixed(1)} battery=${d.battery.toFixed(1)}`;
                  }
                }
              }
            })
          ]
        });
      }

      function updateTable(uavs, missionStatus) {
        const msByUav = new Map((missionStatus || []).map(x => [x.uav_id, x]));
        rows.innerHTML = '';
        for (const u of uavs) {
          const ms = msByUav.get(u.id);
          let missionText = 'IDLE';
          if (ms) {
            missionText = `${missionStateText(ms.state)}(${Math.round((ms.progress || 0) * 100)}%)`;
            if (ms.reason) {
              missionText += ` ${ms.reason}`;
            }
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.id}</td><td>${u.position[0].toFixed(6)}</td><td>${u.position[1].toFixed(6)}</td><td>${u.position[2].toFixed(1)}</td><td class="status-${u.status}">${u.status}</td><td>${missionText}</td>`;
          rows.appendChild(tr);
        }
      }

      function renderFdsRaw(rawObj) {
        const valuesObj = rawObj && typeof rawObj === 'object' && rawObj.values && typeof rawObj.values === 'object'
          ? rawObj.values
          : {};
        const entries = Object.entries(valuesObj)
          .filter(([, v]) => Number.isFinite(Number(v)))
          .map(([k, v]) => [k, Number(v)])
          .sort((a, b) => b[1] - a[1]);

        if (!entries.length) {
          if (rawStats) {
            rawStats.innerHTML = '<span class="badge">sensors=0</span><span class="badge">max=n/a</span><span class="badge">min=n/a</span><span class="badge">avg=n/a</span>';
          }
          if (rawList) {
            rawList.textContent = '等待 FDS 原始数据...';
          }
          rawPrevValues.clear();
          return;
        }

        const nums = entries.map(([, v]) => v);
        const max = Math.max(...nums);
        const min = Math.min(...nums);
        const avg = nums.reduce((s, v) => s + v, 0) / nums.length;
        if (rawStats) {
          rawStats.innerHTML =
            `<span class="badge">sensors=${entries.length}</span>` +
            `<span class="badge">max=${max.toFixed(2)}</span>` +
            `<span class="badge">min=${min.toFixed(2)}</span>` +
            `<span class="badge">avg=${avg.toFixed(2)}</span>`;
        }

        if (rawList) {
          rawList.innerHTML = entries
            .map(([name, val]) => {
              const prev = rawPrevValues.get(name);
              let trendClass = 'trend-same';
              let trendText = '-';
              if (Number.isFinite(prev)) {
                const delta = val - prev;
                if (Math.abs(delta) >= 0.01) {
                  if (delta > 0) {
                    trendClass = 'trend-up';
                    trendText = `+${delta.toFixed(2)}`;
                  } else {
                    trendClass = 'trend-down';
                    trendText = delta.toFixed(2);
                  }
                }
              }
              return `<div class="raw-item"><span>${name}</span><span>${val.toFixed(2)} <span class="${trendClass}">${trendText}</span></span></div>`;
            })
            .join('');
        }

        rawPrevValues.clear();
        for (const [name, val] of entries) {
          rawPrevValues.set(name, val);
        }
      }

      async function tick() {
        try {
          const res = await fetch('/api/swarm_state', {cache: 'no-store'});
          const next = await res.json();
          state.timestamp = next.timestamp;
          state.uavs = next.uavs || [];
          state.links = next.links || [];
          state.fire_hotspots = next.fire_hotspots || [];
          state.mission_targets = next.mission_targets || [];
          state.mission_status = next.mission_status || [];
          state.fds_raw = next.fds_raw || {};
          const missionExec = state.mission_status.filter(x => x.state === 2).length;
          const missionDone = state.mission_status.filter(x => x.state === 3).length;
          const missionFail = state.mission_status.filter(x => x.state === 4).length;
          const avgW = state.links.length
            ? (state.links.reduce((s, x) => s + x.weight, 0) / state.links.length).toFixed(3)
            : 'n/a';
          const maxFire = state.fire_hotspots.length
            ? Math.max(...state.fire_hotspots.map(x => x.intensity || 0)).toFixed(2)
            : 'n/a';
          if (legendMax) {
            legendMax.textContent = `max_fire=${maxFire} | 高危>=${FIRE_THRESH.high.toFixed(2)} 中危>=${FIRE_THRESH.mid.toFixed(2)}`;
          }
          upsertCesiumEntities(state.uavs);
          upsertCesiumLinks(state.uavs, state.links);
          const fireMetrics = upsertFireHotspots(state.fire_hotspots, state.uavs, state.timestamp || Date.now());
          const areaKm2 = fireMetrics.areaKm2.toFixed(3);

          const statusEl = document.getElementById('meta-status');
          if (statusEl) {
            const fdsRawCount = state.fds_raw && state.fds_raw.values && typeof state.fds_raw.values === 'object'
              ? Object.keys(state.fds_raw.values).length
              : 0;
            statusEl.innerHTML = `timestamp=${state.timestamp} <span class="badge">uav_count=${state.uavs.length}</span><span class="badge">link_count=${state.links.length}</span><span class="badge">avg_w=${avgW}</span><span class="badge">fire=${state.fire_hotspots.length}</span><span class="badge">observed_fire=${fireMetrics.observedCount}</span><span class="badge">max_fire=${maxFire}</span><span class="badge">fire_area_km2=${areaKm2}</span><span class="badge">mission=${state.mission_targets.length}</span><span class="badge">exec=${missionExec}</span><span class="badge">done=${missionDone}</span><span class="badge">fail=${missionFail}</span><span class="badge">fds_raw=${fdsRawCount}</span><span class="badge">basemap=${basemapMode}</span><span class="badge">terrain=${terrainMode}</span>`;
          }
          upsertMissionLines(state.uavs, state.mission_targets);
          renderFdsRaw(state.fds_raw);
          updateDeck(state.uavs, state.links);
          updateTable(state.uavs, state.mission_status);
        } catch (_) {
          const statusEl = document.getElementById('meta-status');
          if (statusEl) {
            statusEl.textContent = '数据流中断，等待恢复...';
          }
        }
      }

      setInterval(tick, 500);
      tick();
    </script>
  </body>
